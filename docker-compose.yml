services:

  db:
    image: mysql:8.0
    container_name: malixplore_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: malixplore2026
      MYSQL_DATABASE: malixplore
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pmalixplore2026"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: malixplore_app
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - backend/.env
    environment:
      DB_HOST: db
      DB_PASSWORD: malixplore2026
      DB_NAME: malixplore
    depends_on:
      db:
        condition: service_healthy

volumes:
  mysql_data:
