<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Question secrète — MaliXplore</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="page-auth">

  <div class="auth-wrapper">
    <div class="auth-box">

      <!-- Logo -->
      <div class="auth-logo">
        <h1>MaliXplore</h1>
        <p>Découvrez la richesse du Mali</p>
      </div>

      <!-- Indicateur de progression MFA -->
      <div class="mfa-indicateur" aria-label="Étapes de connexion MFA">
        <!-- Étape 1 : validée (vert) -->
        <div class="mfa-etape">
          <div class="mfa-cercle vert" aria-label="Étape 1 validée">✓</div>
          <span class="mfa-label valide">Identité</span>
        </div>

        <!-- Ligne validée -->
        <div class="mfa-ligne valide"></div>

        <!-- Étape 2 : validée (vert) -->
        <div class="mfa-etape">
          <div class="mfa-cercle vert" aria-label="Étape 2 validée">✓</div>
          <span class="mfa-label valide">OTP</span>
        </div>

        <!-- Ligne validée -->
        <div class="mfa-ligne valide"></div>

        <!-- Étape 3 : active (or) -->
        <div class="mfa-etape">
          <div class="mfa-cercle or" aria-current="step">3</div>
          <span class="mfa-label active">Secret</span>
        </div>
      </div>

      <h2>Connexion — Étape 3</h2>

      <!-- Message d'erreur -->
      <div id="msg-erreur" class="message-erreur" role="alert"></div>

      <!-- Formulaire question secrète -->
      <form id="form-secret" novalidate>

        <!-- Question secrète chargée dynamiquement -->
        <div class="form-groupe">
          <label id="label-question" for="reponse_secrete">
            Chargement de votre question…
          </label>
          <input
            type="password"
            id="reponse_secrete"
            name="reponse_secrete"
            placeholder="Votre réponse"
            autocomplete="off"
            required
          >
          <div class="erreur-champ" id="err-reponse"></div>
        </div>

        <!-- Bouton -->
        <button type="submit" class="btn-primaire" id="btn-valider">
          Valider
        </button>

      </form>

    </div>
  </div>

  <script>
    const form          = document.getElementById('form-secret');
    const btnValider    = document.getElementById('btn-valider');
    const msgErreur     = document.getElementById('msg-erreur');
    const labelQuestion = document.getElementById('label-question');

    // ── Charger la question secrète de l'utilisateur au démarrage ──
    async function chargerQuestion() {
      try {
        // 1. Récupérer le nom de l'utilisateur depuis la session
        const reponseNom = await fetch('/api/session/nom');

        if (!reponseNom.ok) {
          // Session invalide → rediriger vers la connexion
          window.location.href = '/index.html';
          return;
        }

        const { nom } = await reponseNom.json();

        // 2. Récupérer la question secrète associée à ce nom
        const reponseQuestion = await fetch(`/api/question/${encodeURIComponent(nom)}`);

        if (!reponseQuestion.ok) {
          labelQuestion.textContent = 'Impossible de charger la question.';
          return;
        }

        const { question } = await reponseQuestion.json();
        labelQuestion.textContent = question;

      } catch (err) {
        labelQuestion.textContent = 'Erreur de chargement.';
      }
    }

    // Charger la question dès le chargement de la page
    chargerQuestion();

    // ── Soumission du formulaire ───────────────────────────────────
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      msgErreur.classList.remove('visible');

      const reponse_secrete = document.getElementById('reponse_secrete').value;

      if (!reponse_secrete.trim()) {
        msgErreur.textContent = 'Veuillez saisir votre réponse';
        msgErreur.classList.add('visible');
        return;
      }

      btnValider.disabled    = true;
      btnValider.textContent = 'Vérification…';

      try {
        const reponse = await fetch('/auth/secret', {
          method : 'POST',
          headers: { 'Content-Type': 'application/json' },
          body   : JSON.stringify({ reponse_secrete })
        });

        const donnees = await reponse.json();

        if (!reponse.ok) {
          msgErreur.textContent = donnees.erreur || 'Réponse incorrecte';
          msgErreur.classList.add('visible');

          // Vider le champ de réponse
          document.getElementById('reponse_secrete').value = '';

          // Si session invalide, rediriger
          if (donnees.redirect) {
            setTimeout(() => { window.location.href = donnees.redirect; }, 1500);
          }
        } else {
          // Authentification complète → rediriger vers l'accueil
          window.location.href = donnees.redirect || '/accueil.html';
        }

      } catch (err) {
        msgErreur.textContent = 'Erreur réseau. Vérifiez votre connexion.';
        msgErreur.classList.add('visible');
      } finally {
        btnValider.disabled    = false;
        btnValider.textContent = 'Valider';
      }
    });
  </script>

</body>
</html>
