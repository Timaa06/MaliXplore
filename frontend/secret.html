<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Schéma secret — MaliXplore</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .pattern-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
    }
    .pattern-canvas {
      cursor: crosshair;
      touch-action: none;
      border-radius: 12px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(200,168,75,0.15);
    }
    .pattern-hint {
      font-size: 0.85rem;
      color: var(--bogo-sand);
      opacity: 0.7;
      text-align: center;
    }
  </style>
</head>
<body class="page-auth">

  <div class="auth-wrapper">
    <div class="auth-box">

      <div class="auth-logo">
        <h1>MaliXplore</h1>
        <p>Découvrez la richesse du Mali</p>
      </div>

      <div class="mfa-indicateur" aria-label="Étapes de connexion MFA">
        <div class="mfa-etape">
          <div class="mfa-cercle vert">✓</div>
          <span class="mfa-label valide">Identité</span>
        </div>
        <div class="mfa-ligne valide"></div>
        <div class="mfa-etape">
          <div class="mfa-cercle vert">✓</div>
          <span class="mfa-label valide">OTP</span>
        </div>
        <div class="mfa-ligne valide"></div>
        <div class="mfa-etape">
          <div class="mfa-cercle or" aria-current="step">3</div>
          <span class="mfa-label active">Schéma</span>
        </div>
      </div>

      <h2>Connexion — Étape 3</h2>

      <p style="text-align:center;color:var(--bogo-sand);font-size:0.9rem;margin-bottom:1rem;">
        Tracez votre schéma de sécurité
      </p>

      <div id="msg-erreur" class="message-erreur" role="alert"></div>

      <div class="pattern-wrap">
        <canvas id="pattern-canvas" class="pattern-canvas" width="240" height="240"></canvas>
        <p class="pattern-hint" id="pattern-hint">Dessinez votre schéma (minimum 4 points)</p>
        <button class="btn-primaire" id="btn-valider" disabled>Valider</button>
        <button id="btn-effacer" style="background:none;border:none;color:var(--bogo-sand);text-decoration:underline;cursor:pointer;font-size:0.85rem;opacity:0.7;">
          Effacer
        </button>
      </div>

    </div>
  </div>

  <script>
    const msgErreur  = document.getElementById('msg-erreur');
    const btnValider = document.getElementById('btn-valider');
    const btnEffacer = document.getElementById('btn-effacer');
    const hintEl     = document.getElementById('pattern-hint');

    // ---- Pattern Lock ----
    const canvas = document.getElementById('pattern-canvas');
    const ctx    = canvas.getContext('2d');
    const SIZE   = 240, MARGE = 48, RAYON_HIT = 22, RAYON_DOT = 9, RAYON_HALO = 18;

    const positions = [];
    for (let r = 0; r < 3; r++)
      for (let c = 0; c < 3; c++)
        positions.push({ x: MARGE + c * (SIZE - 2*MARGE) / 2, y: MARGE + r * (SIZE - 2*MARGE) / 2, idx: r*3+c });

    let pattern = [], dessin = false, souris = null, erreur = false;

    function dessiner() {
      ctx.clearRect(0, 0, SIZE, SIZE);
      const couleur = erreur ? '#e05555' : '#c8a84b';

      // Lignes tracées
      if (pattern.length > 1) {
        ctx.beginPath();
        ctx.strokeStyle = erreur ? 'rgba(224,85,85,0.7)' : 'rgba(200,168,75,0.7)';
        ctx.lineWidth = 2.5; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
        ctx.moveTo(positions[pattern[0]].x, positions[pattern[0]].y);
        for (let i = 1; i < pattern.length; i++) ctx.lineTo(positions[pattern[i]].x, positions[pattern[i]].y);
        if (dessin && souris) ctx.lineTo(souris.x, souris.y);
        ctx.stroke();
      } else if (pattern.length === 1 && dessin && souris) {
        ctx.beginPath();
        ctx.strokeStyle = 'rgba(200,168,75,0.5)';
        ctx.lineWidth = 2;
        ctx.moveTo(positions[pattern[0]].x, positions[pattern[0]].y);
        ctx.lineTo(souris.x, souris.y);
        ctx.stroke();
      }

      // Points
      positions.forEach(p => {
        const sel = pattern.includes(p.idx);
        if (sel) {
          ctx.beginPath();
          ctx.arc(p.x, p.y, RAYON_HALO, 0, Math.PI*2);
          ctx.fillStyle = erreur ? 'rgba(224,85,85,0.18)' : 'rgba(200,168,75,0.18)';
          ctx.fill();
        }
        ctx.beginPath();
        ctx.arc(p.x, p.y, RAYON_DOT, 0, Math.PI*2);
        if (sel) { ctx.fillStyle = couleur; ctx.fill(); }
        else { ctx.strokeStyle = 'rgba(200,168,75,0.45)'; ctx.lineWidth = 2; ctx.stroke(); ctx.beginPath(); ctx.arc(p.x, p.y, 3, 0, Math.PI*2); ctx.fillStyle = 'rgba(200,168,75,0.35)'; ctx.fill(); }
      });
    }

    function getPos(e) {
      const rect = canvas.getBoundingClientRect();
      const sx = SIZE / rect.width, sy = SIZE / rect.height;
      const cx = e.touches ? e.touches[0].clientX : e.clientX;
      const cy = e.touches ? e.touches[0].clientY : e.clientY;
      return { x: (cx - rect.left) * sx, y: (cy - rect.top) * sy };
    }

    function trouverDot(pos) {
      return positions.find(p => Math.hypot(p.x - pos.x, p.y - pos.y) < RAYON_HIT);
    }

    function debut(e) {
      e.preventDefault();
      erreur = false; pattern = []; dessin = true;
      souris = getPos(e);
      const d = trouverDot(souris);
      if (d) pattern.push(d.idx);
      btnValider.disabled = true;
      hintEl.textContent = 'Dessinez votre schéma (minimum 4 points)';
      dessiner();
    }

    function mouvement(e) {
      if (!dessin) return;
      e.preventDefault();
      souris = getPos(e);
      const d = trouverDot(souris);
      if (d && !pattern.includes(d.idx)) pattern.push(d.idx);
      dessiner();
    }

    function fin(e) {
      if (!dessin) return;
      dessin = false; souris = null;
      if (pattern.length < 4) {
        erreur = true;
        hintEl.textContent = 'Schéma trop court — minimum 4 points';
        btnValider.disabled = true;
      } else {
        hintEl.textContent = `Schéma de ${pattern.length} points — cliquez Valider`;
        btnValider.disabled = false;
      }
      dessiner();
    }

    canvas.addEventListener('mousedown',  debut);
    canvas.addEventListener('mousemove',  mouvement);
    canvas.addEventListener('mouseup',    fin);
    canvas.addEventListener('mouseleave', fin);
    canvas.addEventListener('touchstart', debut,    { passive: false });
    canvas.addEventListener('touchmove',  mouvement,{ passive: false });
    canvas.addEventListener('touchend',   fin);

    btnEffacer.addEventListener('click', () => {
      pattern = []; dessin = false; souris = null; erreur = false;
      btnValider.disabled = true;
      hintEl.textContent = 'Dessinez votre schéma (minimum 4 points)';
      dessiner();
    });

    dessiner();

    // ---- Validation ----
    btnValider.addEventListener('click', async () => {
      if (pattern.length < 4) return;
      msgErreur.classList.remove('visible');
      btnValider.disabled = true;
      btnValider.textContent = 'Vérification…';

      try {
        const rep     = await fetch('/auth/secret', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ schema_secret: pattern.join('') })
        });
        const donnees = await rep.json();

        if (!rep.ok) {
          msgErreur.textContent = donnees.erreur || 'Schéma incorrect';
          msgErreur.classList.add('visible');
          erreur = true; pattern = []; dessiner();
          hintEl.textContent = 'Dessinez votre schéma (minimum 4 points)';
          if (donnees.redirect) setTimeout(() => { window.location.href = donnees.redirect; }, 1500);
        } else {
          window.location.href = donnees.redirect || '/accueil.html';
        }
      } catch {
        msgErreur.textContent = 'Erreur réseau. Vérifiez votre connexion.';
        msgErreur.classList.add('visible');
      } finally {
        btnValider.disabled    = false;
        btnValider.textContent = 'Valider';
      }
    });
  </script>

</body>
</html>
