<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Code OTP — MaliXplore</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="page-auth">

  <div class="auth-wrapper">
    <div class="auth-box">

      
      <div class="auth-logo">
        <h1>MaliXplore</h1>
        <p>Découvrez la richesse du Mali</p>
      </div>

      
      <div class="mfa-indicateur" aria-label="Étapes de connexion MFA">
        
        <div class="mfa-etape">
          <div class="mfa-cercle vert" aria-label="Étape 1 validée">✓</div>
          <span class="mfa-label valide">Identité</span>
        </div>

        
        <div class="mfa-ligne valide"></div>

        
        <div class="mfa-etape">
          <div class="mfa-cercle or" aria-current="step">2</div>
          <span class="mfa-label active">OTP</span>
        </div>

        
        <div class="mfa-ligne"></div>

        
        <div class="mfa-etape">
          <div class="mfa-cercle gris">3</div>
          <span class="mfa-label">Secret</span>
        </div>
      </div>

      <h2>Connexion — Étape 2</h2>

      <p style="text-align:center; color:var(--bogo-sand); margin-bottom:0.5rem; font-size:0.9rem;">
        Un code à 6 chiffres vient d'être envoyé à votre adresse email.
      </p>
      <p style="text-align:center; color:var(--bogo-sand); margin-bottom:1rem; font-size:0.85rem; opacity:0.8;">
        Ce code expire dans <strong>10 minutes</strong>.
      </p>

      <div id="msg-succes" class="message-succes" role="alert"></div>
      <div id="msg-erreur" class="message-erreur" role="alert"></div>

      <form id="form-otp" novalidate>

        <div class="otp-grille" aria-label="Saisie du code OTP à 6 chiffres">
          <input class="otp-chiffre" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" aria-label="Chiffre 1">
          <input class="otp-chiffre" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" aria-label="Chiffre 2">
          <input class="otp-chiffre" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" aria-label="Chiffre 3">
          <input class="otp-chiffre" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" aria-label="Chiffre 4">
          <input class="otp-chiffre" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" aria-label="Chiffre 5">
          <input class="otp-chiffre" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" aria-label="Chiffre 6">
        </div>

        <button type="submit" class="btn-primaire" id="btn-verifier">
          Vérifier
        </button>

      </form>

      <div style="text-align:center; margin-top:1rem;">
        <button id="btn-renvoyer" class="btn-secondaire" style="background:none;border:none;color:var(--bogo-sand);text-decoration:underline;cursor:pointer;font-size:0.9rem;">
          Renvoyer le code
        </button>
        <span id="compte-rebours" style="display:none; color:var(--bogo-sand); font-size:0.85rem; opacity:0.7;"></span>
      </div>

    </div>
  </div>

  <script>
    const form          = document.getElementById('form-otp');
    const btnVerif      = document.getElementById('btn-verifier');
    const msgErreur     = document.getElementById('msg-erreur');
    const msgSucces     = document.getElementById('msg-succes');
    const btnRenvoyer   = document.getElementById('btn-renvoyer');
    const compteRebours = document.getElementById('compte-rebours');
    const cases         = document.querySelectorAll('.otp-chiffre');

    cases[0].focus();

    // --- Bouton renvoyer avec délai 60s ---
    let timerRenvoi = null;

    function demarrerDelaiRenvoi() {
      let secondes = 60;
      btnRenvoyer.style.display = 'none';
      compteRebours.style.display = 'inline';
      compteRebours.textContent = `Renvoyer dans ${secondes}s`;

      timerRenvoi = setInterval(() => {
        secondes--;
        if (secondes <= 0) {
          clearInterval(timerRenvoi);
          compteRebours.style.display = 'none';
          btnRenvoyer.style.display   = 'inline';
        } else {
          compteRebours.textContent = `Renvoyer dans ${secondes}s`;
        }
      }, 1000);
    }

    btnRenvoyer.addEventListener('click', async () => {
      msgErreur.classList.remove('visible');
      msgSucces.classList.remove('visible');
      btnRenvoyer.disabled = true;

      try {
        const reponse = await fetch('/auth/otp/renvoyer', { method: 'POST' });
        const donnees = await reponse.json();

        if (!reponse.ok) {
          msgErreur.textContent = donnees.erreur || 'Erreur lors du renvoi';
          msgErreur.classList.add('visible');
          if (donnees.redirect) window.location.href = donnees.redirect;
        } else {
          msgSucces.textContent = 'Nouveau code envoyé par email !';
          msgSucces.classList.add('visible');
          cases.forEach(c => c.value = '');
          cases[0].focus();
          demarrerDelaiRenvoi();
        }
      } catch {
        msgErreur.textContent = 'Erreur réseau. Vérifiez votre connexion.';
        msgErreur.classList.add('visible');
        btnRenvoyer.disabled = false;
      }
    });

    cases.forEach((input, index) => {

      input.addEventListener('keypress', (e) => {
        if (!/[0-9]/.test(e.key)) {
          e.preventDefault();
        }
      });

      input.addEventListener('input', (e) => {

        input.value = input.value.replace(/\D/g, '').slice(-1);

        if (input.value && index < cases.length - 1) {
          cases[index + 1].focus();
        }
      });

      input.addEventListener('keydown', (e) => {
        if (e.key === 'Backspace' && !input.value && index > 0) {
          cases[index - 1].focus();
        }
      });

      input.addEventListener('paste', (e) => {
        e.preventDefault();
        const colle = (e.clipboardData || window.clipboardData)
          .getData('text')
          .replace(/\D/g, '')
          .slice(0, 6);

        colle.split('').forEach((chiffre, i) => {
          if (cases[i]) cases[i].value = chiffre;
        });

        const dernier = Math.min(colle.length - 1, cases.length - 1);
        if (dernier >= 0) cases[dernier].focus();
      });
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      msgErreur.classList.remove('visible');

      const otp_code = Array.from(cases).map(c => c.value).join('');

      if (otp_code.length !== 6 || !/^\d{6}$/.test(otp_code)) {
        msgErreur.textContent = 'Veuillez saisir les 6 chiffres de votre code OTP';
        msgErreur.classList.add('visible');
        return;
      }

      btnVerif.disabled    = true;
      btnVerif.textContent = 'Vérification…';

      try {
        const reponse = await fetch('/auth/otp', {
          method : 'POST',
          headers: { 'Content-Type': 'application/json' },
          body   : JSON.stringify({ otp_code })
        });

        const donnees = await reponse.json();

        if (!reponse.ok) {
          msgErreur.textContent = donnees.erreur || 'Code OTP incorrect';
          msgErreur.classList.add('visible');

          cases.forEach(c => c.value = '');
          cases[0].focus();

          if (donnees.redirect) {
            setTimeout(() => { window.location.href = donnees.redirect; }, 1500);
          }
        } else {

          window.location.href = donnees.redirect || '/secret.html';
        }

      } catch (err) {
        msgErreur.textContent = 'Erreur réseau. Vérifiez votre connexion.';
        msgErreur.classList.add('visible');
      } finally {
        btnVerif.disabled    = false;
        btnVerif.textContent = 'Vérifier';
      }
    });
  </script>

</body>
</html>
